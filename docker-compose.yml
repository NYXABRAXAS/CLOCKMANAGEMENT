services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: stlms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: deployment/docker/backend.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      PORT: "8080"
      Database__Provider: Postgres
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=stlms;Username=postgres;Password=${POSTGRES_PASSWORD};"
      ConnectionStrings__Redis: "redis:6379"
      Jwt__Secret: ${JWT_SECRET:?set JWT_SECRET in .env}
      Encryption__Key: ${ENCRYPTION_KEY:?set ENCRYPTION_KEY in .env}
      Cookie__Secure: "false"
      WebUrl: "http://localhost:3000"
      Cors__AllowedOrigins__0: "http://localhost:3000"
    ports:
      - "8080:8080"
    volumes:
      - api_data:/app/App_Data
      - api_logs:/app/logs

  web:
    build:
      context: .
      dockerfile: deployment/docker/frontend.Dockerfile
      args:
        VITE_API_URL: "http://localhost:8080/api/v1"
    depends_on:
      - api
    ports:
      - "3000:8080"

volumes:
  postgres_data:
  redis_data:
  api_data:
  api_logs:
