# Render Blueprint for STLMS.
#
# Render has no managed SQL Server offering, so this deploys against an EXTERNAL Postgres database
# you provide - e.g. a free Supabase project (use the "Session pooler" connection string, not
# "Direct connection" - the direct route is IPv6-only on Supabase's free tier and Render may not
# route outbound IPv6). Get that connection string BEFORE running this blueprint; you'll be
# prompted for it (ConnectionStrings__Postgres, sync: false below).
#
# First-deploy URL wiring: stlms-web needs stlms-api's URL, which doesn't exist until stlms-api's
# first deploy finishes. The API_URL env var below is read at container STARTUP (not baked into
# the JS bundle at build time), so fixing this up just needs a restart, not a rebuild:
#   1. Copy stlms-api's *.onrender.com URL.
#   2. Set it (with /api/v1 appended) as API_URL on stlms-web, then trigger a restart (not a full
#      redeploy - the existing image already has the code, it just re-reads the env var on boot).
#   3. Copy stlms-web's URL, set it as WebUrl + Cors__AllowedOrigins__0 on stlms-api, redeploy.
#
# Redis is optional - if Connections__Redis is left blank, the API automatically falls back to an
# in-memory cache (see STLMS.Infrastructure/DependencyInjection.cs).
#
# Weather needs no API key at all - it calls the free, keyless Open-Meteo API directly, chosen
# specifically so this integration works out of the box with zero configuration (see
# OpenMeteoWeatherProvider.cs).
#
# Push notifications (FCM) need a real Firebase project's service account JSON on disk at
# Firebase__ServiceAccountJsonPath - not something a plain env var can provide. Without it the app
# runs fine and just never sends push (logged, never thrown - see FcmPushSender.cs); wiring up a
# real Firebase project requires Render's paid-tier "Secret Files" feature or an equivalent, which
# isn't included in this free-tier blueprint.

services:
  - type: web
    name: stlms-api
    runtime: docker
    dockerfilePath: ./deployment/docker/backend.Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: Database__Provider
        value: Postgres
      - key: ConnectionStrings__Postgres
        sync: false # paste your Supabase (or other Postgres) connection string here
      - key: ConnectionStrings__Redis
        sync: false # optional - leave blank to use the automatic in-memory cache fallback
      - key: Jwt__Secret
        generateValue: true
      - key: Jwt__Issuer
        value: STLMS
      - key: Jwt__Audience
        value: STLMS.Client
      - key: Encryption__Key
        generateValue: true
      - key: Cookie__Secure
        value: "true"
      - key: WebUrl
        sync: false # set to the web service's Render URL after first deploy
      - key: Cors__AllowedOrigins__0
        sync: false # same value as WebUrl
      - key: Smtp__Host
        sync: false
      - key: Smtp__Port
        value: "587"
      - key: Smtp__Username
        sync: false
      - key: Smtp__Password
        sync: false
      - key: Smtp__FromAddress
        sync: false
      - key: OAuth__Google__ClientId
        sync: false
      - key: OAuth__Google__ClientSecret
        sync: false
      - key: OAuth__Microsoft__ClientId
        sync: false
      - key: OAuth__Microsoft__ClientSecret
        sync: false

  - type: web
    name: stlms-web
    runtime: docker
    dockerfilePath: ./deployment/docker/frontend.Dockerfile
    dockerContext: .
    envVars:
      - key: API_URL
        sync: false # set to https://<stlms-api-url>.onrender.com/api/v1 after stlms-api's first deploy
    plan: free
